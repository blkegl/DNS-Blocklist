name: Build Blocklist

on:
  schedule:
    # 3 AM Bangladesh time (UTC+6)
    - cron: '0 21 * * *'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate blocklist
        run: python build.py

      - name: Commit updated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Add generated blocklists
          git add adaway.txt

          git commit -m "Update blocklists" || echo "No changes"
          git push
